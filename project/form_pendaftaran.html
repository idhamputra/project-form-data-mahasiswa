<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Data Mahasiswa</title>
  <style>
    :root{ --shadow: 0 18px 50px rgba(0,0,0,.45); --radius: 28px; }

    body[data-theme="dark"]{
      --bg1:#0f172a; --bg2:#111827; --card:#0b1220cc; --stroke:#ffffff22;
      --text:#e5e7eb; --muted:#9ca3af; --accent:#22c55e; --accent2:#60a5fa;
      --danger:#fb7185; --overlay: rgba(0,0,0,.55); --modalbg: rgba(10, 15, 25, .92);
      --theadbg: rgba(20, 30, 50, .95);
    }
    body[data-theme="light"]{
      --bg1:#f8fafc; --bg2:#eef2ff; --card:rgba(255,255,255,.75); --stroke:rgba(2,6,23,.12);
      --text:#0f172a; --muted:#475569; --accent:#16a34a; --accent2:#2563eb;
      --danger:#e11d48; --overlay: rgba(15,23,42,.35); --modalbg: rgba(255,255,255,.92);
      --theadbg: rgba(241,245,249,.95);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0; min-height:100vh; display:grid; place-items:center; padding:28px 14px;
      color:var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1000px 500px at 20% 15%, color-mix(in srgb, var(--accent) 25%, transparent), transparent 60%),
        radial-gradient(900px 600px at 85% 10%, color-mix(in srgb, var(--accent2) 25%, transparent), transparent 55%),
        radial-gradient(900px 600px at 60% 90%, color-mix(in srgb, var(--danger) 18%, transparent), transparent 55%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      transition: background .25s ease, color .25s ease;
    }

    .wrap{ width:min(920px, 96vw); }
    .card{
      background:var(--card); border:1px solid var(--stroke); border-radius:var(--radius);
      box-shadow:var(--shadow); backdrop-filter: blur(10px); overflow:hidden;
    }
    .header{
      padding:22px 22px 16px; border-bottom:1px solid var(--stroke);
      display:flex; align-items:flex-start; justify-content:space-between; gap:14px;
    }
    .titlebox{ display:flex; flex-direction:column; gap:6px; }
    .title{
      margin:0; font-size:18px; letter-spacing:.08em; text-transform:uppercase; font-weight:800;
      display:flex; align-items:center; gap:10px;
    }
    .subtitle{ margin:0; color:var(--muted); font-size:13px; line-height:1.4; }

    .toggle{
      border:1px solid var(--stroke); background: rgba(255,255,255,.08); color:var(--text);
      padding:10px 12px; border-radius:14px; cursor:pointer; font-weight:900; letter-spacing:.04em;
      display:inline-flex; align-items:center; gap:10px; transition: transform .12s ease, background .12s ease;
      user-select:none;
    }
    .toggle:hover{ transform: translateY(-1px); background: rgba(255,255,255,.12); }
    .toggle:active{ transform: translateY(0); opacity:.92; }

    .content{ padding:22px; }
    form{ display:grid; grid-template-columns: 1fr; gap:14px; }
    .grid{ display:grid; grid-template-columns: 1fr; gap:14px; }
    @media (min-width: 720px){
      .grid{ grid-template-columns: 1fr 1fr; }
      .full{ grid-column: 1 / -1; }
    }

    .field{
      padding:14px 14px 12px; border:1px solid var(--stroke); border-radius:14px;
      background:rgba(255,255,255,.04);
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }
    body[data-theme="light"] .field{ background: rgba(2,6,23,.03); }
    .field:hover{
      transform: translateY(-1px); background:rgba(255,255,255,.06);
      border-color: color-mix(in srgb, var(--stroke) 50%, rgba(255,255,255,.35));
    }

    label{
      display:block; font-size:12px; letter-spacing:.06em; text-transform:uppercase;
      color:var(--muted); margin:0 0 8px; font-weight:700;
    }
    input, textarea{
      width:100%; border:none; outline:none; background:transparent; color:var(--text);
      font-size:15px; line-height:1.4; padding:2px 0 0; font-family: inherit;
    }
    textarea{ min-height:96px; resize:vertical; }
    .field:focus-within{
      border-color: color-mix(in srgb, var(--accent) 60%, transparent);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 15%, transparent);
      background: color-mix(in srgb, var(--accent) 7%, transparent);
    }

    .actions{
      display:flex; flex-wrap:wrap; gap:12px; justify-content:flex-end;
      margin-top:6px; padding-top:16px;
      border-top:1px dashed color-mix(in srgb, var(--stroke) 80%, transparent);
    }

    .btn{
      border:none; cursor:pointer; padding:12px 16px; border-radius:14px; font-weight:800;
      letter-spacing:.03em; display:inline-flex; align-items:center; gap:10px;
      transition: transform .12s ease, filter .12s ease, opacity .12s ease, background .12s ease;
      color:#07120a;
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--accent) 95%, white),
        color-mix(in srgb, var(--accent2) 85%, white)
      );
      box-shadow: 0 12px 24px rgba(0,0,0,.25);
    }
    .btn:hover{ transform: translateY(-1px); filter: brightness(1.03); }
    .btn:active{ transform: translateY(0); opacity:.92; }

    .btn.secondary{
      color:var(--text); background: rgba(255,255,255,.08);
      border:1px solid var(--stroke); box-shadow:none;
    }
    .btn.secondary:hover{ background: rgba(255,255,255,.12); filter:none; }

    .icon{ width:18px; height:18px; flex:0 0 18px; display:inline-block; }

    /* ===== SIMPAN jadi hitam + putih ===== */
    #btnSimpan{
      border:1px solid var(--stroke);
      color:#ffffff;
      background:#000000;
      box-shadow: 0 12px 24px rgba(0,0,0,.35);
    }
    #btnSimpan .icon{ stroke: currentColor; }
    #btnSimpan:hover{ transform: translateY(-1px); background:#0b0b0b; filter:none; }
    #btnSimpan:active{ transform: translateY(0); opacity:.92; background:#000000; }

    /* ===== Modal ===== */
    .modal-backdrop{
      position:fixed; inset:0; background: var(--overlay);
      display:none; align-items:center; justify-content:center; padding:18px; z-index:999;
    }
    .modal-backdrop.show{ display:flex; }

    .modal{
      width:min(980px, 96vw); max-height: min(80vh, 720px); overflow:hidden;
      border-radius: 18px; border:1px solid var(--stroke);
      background: var(--modalbg); backdrop-filter: blur(10px);
      box-shadow: 0 24px 70px rgba(0,0,0,.55);
      display:flex; flex-direction:column;
    }
    .modal-head{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:14px 16px; border-bottom:1px solid var(--stroke);
    }
    .modal-title{
      margin:0; font-weight:900; letter-spacing:.06em; text-transform:uppercase; font-size:14px;
    }
    .modal-body{ padding:14px 16px 16px; overflow:auto; }

    .toolbar{
      display:flex; gap:10px; flex-wrap:wrap; justify-content:space-between; align-items:center;
      margin-bottom:12px;
    }
    .search{
      flex:1 1 260px; display:flex; gap:10px; align-items:center;
      padding:10px 12px; border-radius:14px; border:1px solid var(--stroke);
      background: rgba(255,255,255,.06);
    }
    body[data-theme="light"] .search{ background: rgba(2,6,23,.03); }
    .search input{
      border:none; outline:none; background:transparent; color:var(--text);
      width:100%; font-size:14px;
    }
    .pill{
      flex:0 0 auto; font-size:12px; color:color-mix(in srgb, var(--text) 80%, transparent);
      border:1px solid var(--stroke); background: rgba(255,255,255,.06);
      padding:8px 10px; border-radius:999px; white-space:nowrap;
    }

    table{
      width:100%; border-collapse:separate; border-spacing:0; overflow:hidden;
      border-radius:16px; border:1px solid var(--stroke);
      background: rgba(255,255,255,.03);
    }
    body[data-theme="light"] table{ background: rgba(2,6,23,.02); }
    thead th{
      position:sticky; top:0; background: var(--theadbg); border-bottom:1px solid var(--stroke);
      text-align:left; font-size:12px; letter-spacing:.06em; text-transform:uppercase;
      color:color-mix(in srgb, var(--text) 85%, transparent);
      padding:12px 12px; z-index:1;
    }
    tbody td{
      padding:12px 12px; border-bottom:1px solid color-mix(in srgb, var(--stroke) 70%, transparent);
      vertical-align:top; font-size:14px; color:color-mix(in srgb, var(--text) 92%, transparent);
      word-break:break-word;
    }
    tbody tr:hover td{ background: rgba(255,255,255,.04); }

    .col-actions{ width:170px; white-space:nowrap; }
    .action-wrap{ display:flex; gap:8px; align-items:center; }

    .mini{
      padding:8px 10px; border-radius:12px; border:1px solid var(--stroke);
      background: rgba(255,255,255,.06); color:var(--text); cursor:pointer;
      font-weight:800; font-size:12px; display:inline-flex; gap:8px; align-items:center;
    }
    .mini:hover{ background: rgba(255,255,255,.10); }
    .mini.danger{
      border-color: color-mix(in srgb, var(--danger) 40%, transparent);
      background: color-mix(in srgb, var(--danger) 12%, transparent);
    }

    @media (max-width: 540px){
      .hide-sm{ display:none; }
      .col-actions{ width:140px; }
      tbody td, thead th{ padding:10px 10px; }
    }

    /* ===== Notice Tengah (pengganti alert + confirm) ===== */
    .notice-backdrop{
      position:fixed; inset:0; display:none; align-items:center; justify-content:center;
      padding:18px; z-index:2000; background: rgba(0,0,0,.55);
    }
    .notice-backdrop.show{ display:flex; }

    .notice{
      width:min(420px, 92vw); border-radius:16px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(10,15,25,.92);
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 70px rgba(0,0,0,.55);
      padding:16px 16px 14px;
      color: var(--text);
    }
    body[data-theme="light"] .notice{
      background: rgba(255,255,255,.92);
      border:1px solid rgba(2,6,23,.12);
    }
    .notice-title{ font-weight:900; letter-spacing:.04em; margin-bottom:6px; }
    .notice-msg{
      color: color-mix(in srgb, var(--text) 85%, transparent);
      margin-bottom:12px; line-height:1.45;
    }
    .notice-actions{ display:flex; gap:10px; }

    /* ===== OK notice jadi hitam + putih (samakan dengan SIMPAN) ===== */
    .notice-btn{
      flex:1 1 auto;
      border:1px solid var(--stroke);
      cursor:pointer;
      padding:10px 12px;
      border-radius:12px;
      font-weight:900;
      letter-spacing:.03em;
      background:#000;
      color:#fff;
      transition: transform .12s ease, opacity .12s ease, background .12s ease;
    }
    .notice-btn:hover{ transform: translateY(-1px); background:#0b0b0b; }
    .notice-btn:active{ transform: translateY(0); opacity:.92; background:#000; }

    .notice-btn.cancel{
      background: rgba(255,255,255,.10);
      color: var(--text);
      border:1px solid var(--stroke);
    }
  </style>
</head>

<body data-theme="dark">
  <div class="wrap">
    <div class="card">
      <div class="header">
        <div class="titlebox">
          <h1 class="title">Form Data Mahasiswa</h1>
        </div>

        <div class="mid-actions">
          <button class="toggle" type="button" id="btnTheme" aria-label="Ganti tema">
            <span id="themeText">Gelap</span>
          </button>
        </div>
      </div>

      <div class="content">
        <form id="formMahasiswa" autocomplete="on">
          <div class="grid">
            <div class="field">
              <label for="nama">Nama</label>
              <input id="nama" name="nama" type="text" placeholder="Contoh: Cristiano Ronaldo" required />
            </div>

            <div class="field">
              <label for="nim">NIM</label>
              <input id="nim" name="nim" type="text" inputmode="numeric" placeholder="Contoh: 152025000"
                     pattern="[0-9]+" title="NIM harus angka saja" required />
            </div>

            <div class="field">
              <label for="kelas">Kelas</label>
              <input id="kelas" name="kelas" type="text" placeholder="Contoh: AA/BB/CC" required />
            </div>

            <div class="field">
              <label for="jurusan">Jurusan</label>
              <input id="jurusan" name="jurusan" type="text" placeholder="Contoh: Informatika" required />
            </div>

            <div class="field full">
              <label for="alamat">Alamat</label>
              <textarea id="alamat" name="alamat" placeholder="Masukkan alamat lengkap" required></textarea>
            </div>

            <div class="field full">
              <label for="nohp">No HP</label>
              <input id="nohp" name="nohp" type="tel" inputmode="numeric" placeholder="Contoh: 081234567890"
                     pattern="[0-9]+" title="No HP harus angka saja" required />
            </div>
          </div>

          <div class="actions">
            <button class="btn secondary" type="button" id="btnLihat">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18M3 9h18M3 15h18M19 21H5a2 2 0 0 1-2-2v-4m18 6v-6"/>
              </svg>
              LIHAT DATA
            </button>

            <button class="btn secondary" type="reset" id="btnReset">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
                <path d="M21 3v7h-7"/>
              </svg>
              RESET
            </button>

            <button class="btn" type="submit" id="btnSimpan">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <path d="M17 21v-8H7v8"/>
                <path d="M7 3v5h8"/>
              </svg>
              SIMPAN
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== Modal / Popup Tabel ===== -->
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 class="modal-title" id="modalTitle">Data Pendaftaran Mahasiswa</h2>
        <button class="mini" type="button" id="btnClose">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18"/><path d="M6 6l12 12"/>
          </svg>
          Tutup
        </button>
      </div>

      <div class="modal-body">
        <div class="toolbar">
          <div class="search" title="Cari data">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M21 21l-4.3-4.3"></path>
            </svg>
            <input id="searchInput" type="text" placeholder="Cari nama / NIM / kelas / jurusan..." />
          </div>

          <div class="pill" id="countPill">Total: 0 data</div>

          <button class="mini danger" type="button" id="btnHapusSemua" title="Hapus semua data">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v6"></path>
              <path d="M14 11v6"></path>
            </svg>
            Hapus Semua
          </button>
        </div>

        <table>
          <thead>
            <tr>
              <th style="width:56px;">No</th>
              <th>Nama</th>
              <th class="hide-sm">NIM</th>
              <th>Kelas</th>
              <th class="hide-sm">Jurusan</th>
              <th class="hide-sm">No HP</th>
              <th class="hide-sm">Alamat</th>
              <th class="col-actions">Aksi</th>
            </tr>
          </thead>
          <tbody id="tbodyData"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ===== Notice Tengah (pengganti alert + confirm) ===== -->
  <div class="notice-backdrop" id="noticeBackdrop" aria-hidden="true">
    <div class="notice" role="status" aria-live="polite">
      <div class="notice-title" id="noticeTitle">Info</div>
      <div class="notice-msg" id="noticeMsg">...</div>
      <div class="notice-actions">
        <button class="notice-btn" type="button" id="noticeOk">OK</button>
        <button class="notice-btn cancel" type="button" id="noticeCancel">Batal</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "pendaftaran_mahasiswa_v1";
    const THEME_KEY = "tema_app_v1";

    const form = document.getElementById("formMahasiswa");
    const btnLihat = document.getElementById("btnLihat");

    const modalBackdrop = document.getElementById("modalBackdrop");
    const btnClose = document.getElementById("btnClose");
    const tbodyData = document.getElementById("tbodyData");
    const countPill = document.getElementById("countPill");
    const searchInput = document.getElementById("searchInput");
    const btnHapusSemua = document.getElementById("btnHapusSemua");

    const inputNim = document.getElementById("nim");
    const inputNohp = document.getElementById("nohp");

    let editingId = null;

    // ===== THEME =====
    const btnTheme = document.getElementById("btnTheme");
    const themeText = document.getElementById("themeText");

    function setTheme(theme){
      document.body.setAttribute("data-theme", theme);
      localStorage.setItem(THEME_KEY, theme);
      themeText.textContent = (theme === "light") ? "Terang" : "Gelap";
    }
    function initTheme(){
      const saved = localStorage.getItem(THEME_KEY);
      if(saved === "light" || saved === "dark"){ setTheme(saved); return; }
      const preferLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
      setTheme(preferLight ? "light" : "dark");
    }
    btnTheme.addEventListener("click", () => {
      const current = document.body.getAttribute("data-theme") || "dark";
      setTheme(current === "dark" ? "light" : "dark");
    });

    // ===== Notice (alert + confirm custom) =====
    const noticeBackdrop = document.getElementById("noticeBackdrop");
    const noticeTitle = document.getElementById("noticeTitle");
    const noticeMsg = document.getElementById("noticeMsg");
    const noticeOk = document.getElementById("noticeOk");
    const noticeCancel = document.getElementById("noticeCancel");

    let noticeResolve = null;
    let noticeMode = "alert";

    function openNotice(){
      noticeBackdrop.classList.add("show");
      noticeBackdrop.setAttribute("aria-hidden","false");
      noticeOk.focus();
    }
    function closeNotice(){
      noticeBackdrop.classList.remove("show");
      noticeBackdrop.setAttribute("aria-hidden","true");
    }

    function showNotice(title, msg){
      noticeMode = "alert";
      noticeResolve = null;
      noticeTitle.textContent = title ?? "Info";
      noticeMsg.textContent = msg ?? "";
      noticeCancel.style.display = "none";
      openNotice();
    }

    function confirmNotice(title, msg){
      noticeMode = "confirm";
      noticeTitle.textContent = title ?? "Konfirmasi";
      noticeMsg.textContent = msg ?? "";
      noticeCancel.style.display = "inline-block";
      openNotice();
      return new Promise((resolve) => { noticeResolve = resolve; });
    }

    noticeOk.addEventListener("click", () => {
      closeNotice();
      if(noticeMode === "confirm"){
        const r = noticeResolve; noticeResolve = null;
        r?.(true);
      }
    });

    noticeCancel.addEventListener("click", () => {
      closeNotice();
      if(noticeMode === "confirm"){
        const r = noticeResolve; noticeResolve = null;
        r?.(false);
      }
    });

    noticeBackdrop.addEventListener("click", (e) => {
      if(e.target === noticeBackdrop){
        closeNotice();
        if(noticeMode === "confirm"){
          const r = noticeResolve; noticeResolve = null;
          r?.(false);
        }
      }
    });

    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape"){
        if(modalBackdrop.classList.contains("show")) closeModal();
        if(noticeBackdrop.classList.contains("show")){
          closeNotice();
          if(noticeMode === "confirm"){
            const r = noticeResolve; noticeResolve = null;
            r?.(false);
          }
        }
      }
    });

    // ===== helper: hanya angka saat mengetik =====
    function enforceDigitsOnly(el){
      el.addEventListener("input", () => {
        const before = el.value;
        const after = before.replace(/\D/g, "");
        if(before !== after) el.value = after;
      });
      el.addEventListener("paste", (e) => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData("text") || "";
        const digits = text.replace(/\D/g, "");
        document.execCommand("insertText", false, digits);
      });
    }
    enforceDigitsOnly(inputNim);
    enforceDigitsOnly(inputNohp);

    // ===== DATA =====
    function loadData(){
      try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch{ return []; }
    }
    function saveData(arr){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    }
    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    function renderTable(filterText = ""){
      const data = loadData();
      const q = filterText.trim().toLowerCase();
      const filtered = q
        ? data.filter(item => {
            const all = `${item.nama} ${item.nim} ${item.kelas} ${item.jurusan} ${item.nohp} ${item.alamat}`.toLowerCase();
            return all.includes(q);
          })
        : data;

      countPill.textContent = `Total: ${filtered.length} data`;

      if(filtered.length === 0){
        tbodyData.innerHTML = `
          <tr>
            <td colspan="8" style="padding:16px; color:rgba(229,231,235,.75);">
              Belum ada data pendaftaran. Silakan isi form lalu klik <b>SIMPAN</b>.
            </td>
          </tr>
        `;
        return;
      }

      tbodyData.innerHTML = filtered.map((item, idx) => `
        <tr>
          <td>${idx + 1}</td>
          <td>${escapeHtml(item.nama)}</td>
          <td class="hide-sm">${escapeHtml(item.nim)}</td>
          <td>${escapeHtml(item.kelas)}</td>
          <td class="hide-sm">${escapeHtml(item.jurusan)}</td>
          <td class="hide-sm">${escapeHtml(item.nohp)}</td>
          <td class="hide-sm">${escapeHtml(item.alamat)}</td>
          <td class="col-actions">
            <div class="action-wrap">
              <button class="mini" type="button" data-edit="${item._id}">Edit</button>
              <button class="mini danger" type="button" data-delete="${item._id}">Hapus</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function openModal(){
      modalBackdrop.classList.add("show");
      modalBackdrop.setAttribute("aria-hidden","false");
      searchInput.value = "";
      renderTable("");
      searchInput.focus();
    }
    function closeModal(){
      modalBackdrop.classList.remove("show");
      modalBackdrop.setAttribute("aria-hidden","true");
    }

    btnLihat.addEventListener("click", openModal);
    btnClose.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", (e) => {
      if(e.target === modalBackdrop) closeModal();
    });
    searchInput.addEventListener("input", () => renderTable(searchInput.value));

    btnHapusSemua.addEventListener("click", async () => {
      const ok = await confirmNotice("Konfirmasi", "Yakin mau hapus semua data pendaftaran?");
      if(!ok) return;
      saveData([]);
      editingId = null;
      renderTable(searchInput.value);
      showNotice("Info", "Semua data berhasil dihapus.");
    });

    tbodyData.addEventListener("click", (e) => {
      const btnEdit = e.target.closest("[data-edit]");
      if(btnEdit){
        const id = btnEdit.getAttribute("data-edit");
        const data = loadData();
        const item = data.find(x => x._id === id);
        if(!item) return;

        document.getElementById("nama").value = item.nama || "";
        document.getElementById("nim").value = item.nim || "";
        document.getElementById("kelas").value = item.kelas || "";
        document.getElementById("jurusan").value = item.jurusan || "";
        document.getElementById("alamat").value = item.alamat || "";
        document.getElementById("nohp").value = item.nohp || "";

        editingId = id;
        closeModal();
        document.getElementById("nama").focus();
        showNotice("Info", "Silakan ubah data pada form, lalu klik SIMPAN untuk memperbarui.");
        return;
      }

      const btnDelete = e.target.closest("[data-delete]");
      if(!btnDelete) return;

      const id = btnDelete.getAttribute("data-delete");
      const data = loadData();
      const next = data.filter(x => x._id !== id);
      saveData(next);
      if(editingId === id) editingId = null;

      renderTable(searchInput.value);
      showNotice("Info", "Data berhasil dihapus.");
    });

    function isDigitsOnly(s){ return /^\d+$/.test(String(s || "").trim()); }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if(!form.reportValidity()) return;

      const fd = new FormData(form);
      const item = Object.fromEntries(fd.entries());

      if(!isDigitsOnly(item.nim)){
        showNotice("Gagal", "NIM harus diisi angka saja. Data tidak disimpan.");
        inputNim.focus();
        return;
      }
      if(!isDigitsOnly(item.nohp)){
        showNotice("Gagal", "No HP harus diisi angka saja. Data tidak disimpan.");
        inputNohp.focus();
        return;
      }

      const data = loadData();

      if(editingId){
        const idx = data.findIndex(x => x._id === editingId);
        if(idx !== -1){
          item._id = editingId;
          data[idx] = item;
          saveData(data);
          editingId = null;
          showNotice("Sukses", "Data berhasil diperbarui.");
          form.reset();
          return;
        }else{
          editingId = null;
        }
      }

      item._id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      data.unshift(item);
      saveData(data);

      showNotice("Sukses", "Data berhasil disimpan.");
      form.reset();
    });

    form.addEventListener("reset", () => { editingId = null; });

    initTheme();
    renderTable("");
  </script>
</body>
</html>
